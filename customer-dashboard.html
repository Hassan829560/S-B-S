<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Salama Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <header class="bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
      <div class="mx-auto flex max-w-7xl items-center justify-between p-4 md:p-6">
        <a href="index.html" class="text-xl font-bold tracking-wide text-sky-700">Salama</a>
        <nav id="nav-menu" class="hidden w-full md:flex md:w-auto">
          <ul class="flex flex-col gap-2 md:flex-row md:items-center md:gap-4">
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="index.html">Home</a></li>
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="#book">Book Route</a></li>
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="#bookings">My Bookings</a></li>
            <li><span class="rounded-md px-3 py-2 text-sm font-medium text-slate-700" id="user-display"></span></li>
            <li><button id="logout-btn" class="rounded-md px-3 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700">Logout</button></li>
          </ul>
        </nav>
      </div>
    </header>
    
    <main class="mx-auto max-w-5xl p-4 md:p-6">
        <section id="book" class="mb-8 bg-white p-6 rounded-xl shadow-sm">
            <h2 class="text-2xl font-semibold text-slate-900 mb-4">Book a Route</h2>
            <form id="booking-form" class="grid gap-4">
                <div>
                    <label for="route-select" class="block text-sm font-medium text-slate-700">Select Route</label>
                    <select id="route-select" required class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-sky-500 focus:ring focus:ring-sky-200" >
                        <option value="">Choose a route</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Select Seats</label>
                    <div id="seat-layout" class="grid grid-cols-5 gap-2 max-w-md">
                        <!-- Seats will be generated here -->
                    </div>
                    <p class="text-sm text-slate-600 mt-2">Selected seats: <span id="selected-count">0</span></p>
                </div>
                
                <button type="submit" class="rounded-md bg-sky-600 px-4 py-2 text-white font-semibold hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-400">Book Now</button>
            </form>
        </section>
        
        <section id="bookings" class="mb-8">
            <h2 class="text-2xl font-semibold text-slate-900 mb-3">My Bookings</h2>
            <div id="bookings-list" class="space-y-3"></div>
        </section>
    </main>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-EuP7XY2Zr3MChU/36AZ0O8htBls+9bzYFZ1eilU7e4BuW4Vrsay8uaUHFa8cj1QGsv16F4bXHEmQn/KyyWr8sA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="authUtils.js"></script>
    <script>
        // Protect page: require customer role
        if (!requireRole('customer')) {
            // Will redirect to index.html
        }
    </script>
    <script src="customer-dashboard.js"></script>
</body>
</html>
