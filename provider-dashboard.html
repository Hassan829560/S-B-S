<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Provider Dashboard - Salama Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <header class="bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
      <div class="mx-auto flex max-w-7xl items-center justify-between p-4 md:p-6">
        <a href="index.html" class="text-xl font-bold tracking-wide text-sky-700">Salama</a>
        <nav id="nav-menu" class="hidden w-full md:flex md:w-auto">
          <ul class="flex flex-col gap-2 md:flex-row md:items-center md:gap-4">
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="index.html">Home</a></li>
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="#routes">My Routes</a></li>
            <li><a class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-sky-100 hover:text-sky-700" href="#bookings">Bookings</a></li>
            <li><span class="rounded-md px-3 py-2 text-sm font-medium text-slate-700" id="user-display"></span></li>
            <li><button id="logout-btn" class="rounded-md px-3 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700">Logout</button></li>
          </ul>
        </nav>
      </div>
    </header>
    
    <main class="mx-auto max-w-6xl p-4 md:p-6">
        <div id="provider-booking-stats" class="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-4"></div>
        <section id="routes" class="mb-8">
            <h2 class="text-2xl font-semibold text-slate-900 mb-4">My Routes</h2>
            <form id="add-route-form" class="bg-white p-6 rounded-xl shadow-sm mb-6">
                <div class="grid gap-4 sm:grid-cols-4">
                    <div>
                        <label for="start" class="block text-sm font-medium text-slate-700 mb-1">Start Location</label>
                        <input type="text" id="start" placeholder="e.g., Nairobi" required class="w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-sky-500 focus:ring focus:ring-sky-200">
                    </div>
                    <div>
                        <label for="end" class="block text-sm font-medium text-slate-700 mb-1">End Location</label>
                        <input type="text" id="end" placeholder="e.g., Mombasa" required class="w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-sky-500 focus:ring focus:ring-sky-200">
                    </div>
                    <div>
                        <label for="price" class="block text-sm font-medium text-slate-700 mb-1">Price (KES)</label>
                        <input type="number" id="price" placeholder="1500" required class="w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-sky-500 focus:ring focus:ring-sky-200">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">&nbsp;</label>
                        <div class="flex gap-2">
                            <button type="submit" id="submit-route-btn" class="w-full rounded-md bg-sky-600 px-4 py-2 text-white font-semibold hover:bg-sky-700">Add Route</button>
                            <button type="button" id="cancel-edit-btn" class="hidden rounded-md bg-slate-300 px-4 py-2 text-slate-700 font-semibold hover:bg-slate-400">Cancel</button>
                        </div>
                    </div>
                </div>
            </form>
            <div id="routes-list" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        </section>
        
        <section id="bookings" class="mb-8">
            <h2 class="text-2xl font-semibold text-slate-900 mb-4">Bookings for My Routes</h2>
            <div id="bookings-list" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        </section>
    </main>

    <footer class="bg-slate-900 text-white text-center py-6 mt-12">
        <p>&copy; 2024 Salama Booking System. All rights reserved.</p>
    </footer>

    <script src="authUtils.js"></script>
    <script src="provider-dashboard.js"></script>
    <script>
        // Protect this page - only providers can access
        requireRole('provider');
        
        // Set up logout button
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }

        // Display user info
        const user = getUser();
        const userDisplay = document.getElementById('user-display');
        if (user && userDisplay) {
            userDisplay.textContent = user.username;
        }
    </script>
</body>
</html>
